messages:
  enable-prefix: false
  prefix: "<gradient:#00d4ff:#0099ff><bold>[ template ]</bold></gradient> <dark_gray>»</dark_gray> <white>"

storage:
  method: sqlite

  mysql:
    host: localhost
    port: 3306
    database: template_db
    username: template
    password: password
    pool:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  sqlite:
    path: data.db

metrics:
  enabled: true
